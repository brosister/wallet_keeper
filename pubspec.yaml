name: wallet_keeper
description: "Wallet Keeper - simple household ledger app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  another_telephony: ^0.4.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^11.5.0
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  flutter_local_notifications: ^17.2.2
  fluttertoast: ^8.2.12
  google_mobile_ads: ^5.3.1
  google_sign_in: ^6.3.0
  http: ^1.6.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  kakao_flutter_sdk: ^1.9.7+3
  naver_login_sdk: ^3.1.6
  permission_handler: ^12.0.1
  photo_manager: ^3.5.0
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^6.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/fonts/
    - assets/icons/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/wallet_keeper_logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
